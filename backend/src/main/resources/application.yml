# Base configuration shared by all profiles.
spring:
  application:
    name: linkup-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/linkup
    username: linkup
    password: linkup
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      # Ephemeral state (presence, typing) lives in Redis with TTLs — never Postgres.
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    # Durable async backbone (Day 9): every message is also written to a Kafka topic so
    # async consumers (push, search, AI later) process it independently of live delivery.
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: linkup-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # Don't crash the app if Kafka is briefly unavailable at startup — keep retrying.
      missing-topics-fatal: false

  # Graceful drain (Day 9): on SIGTERM stop accepting new work, let in-flight finish, then exit.
  lifecycle:
    timeout-per-shutdown-phase: 20s

  jpa:
    hibernate:
      # 'validate' — Hibernate checks the entity mappings against the real schema
      # at startup but NEVER changes it. Flyway owns the schema; this catches drift.
      ddl-auto: validate
    open-in-view: false        # avoid the OSIV anti-pattern (lazy loads in the view layer)
    properties:
      hibernate:
        jdbc:
          time_zone: UTC        # store/compare timestamps in UTC, always

  flyway:
    enabled: true
    locations: classpath:db/migration

# Application-specific config. Secrets come from env vars in real deploys;
# the default here is dev-only and must be overridden in prod.
linkup:
  security:
    jwt:
      # 256-bit base64 secret for HS256. Dev default ONLY — override LINKUP_JWT_SECRET in prod.
      secret: ${LINKUP_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==}
      access-token-ttl: ${LINKUP_JWT_TTL:PT1H}   # ISO-8601 duration: 1 hour
      issuer: linkup

  media:
    # Direct-to-blob media (Day 10, ADR-0005): the app only ever PRESIGNS URLs; clients
    # PUT/GET bytes straight to object storage. The endpoint must be the one the BROWSER
    # reaches (it's signed into the URL), so it points at the host-published MinIO, not the
    # in-cluster name — presigning is offline, so the backend never has to reach it itself.
    endpoint: ${LINKUP_MEDIA_ENDPOINT:http://localhost:9000}
    region: ${LINKUP_MEDIA_REGION:us-east-1}
    access-key: ${LINKUP_MEDIA_ACCESS_KEY:linkup}
    secret-key: ${LINKUP_MEDIA_SECRET_KEY:linkup-secret}
    bucket: ${LINKUP_MEDIA_BUCKET:linkup-media}
    presign-ttl: ${LINKUP_MEDIA_PRESIGN_TTL:PT5M}   # short-lived upload/download URLs
    max-upload-bytes: ${LINKUP_MEDIA_MAX_UPLOAD_BYTES:26214400}   # 25 MiB
    # Allowlist of content-types we'll presign an upload for (images + voice/audio for Day 10).
    allowed-content-types: >-
      image/jpeg,image/png,image/webp,image/gif,
      audio/webm,audio/ogg,audio/mpeg,audio/mp4,audio/wav

  push:
    # Push notifications (Day 11, ADR-0008). The `linkup-push` Kafka consumer wakes OFFLINE devices,
    # deduped vs in-app delivery. fcm.enabled=false → LoggingPushSender (dev, no external creds);
    # flip it on + supply project-id/access-token to use the real FcmPushSender (HTTP v1) drop-in.
    body-preview-max: ${LINKUP_PUSH_BODY_PREVIEW_MAX:140}
    fcm:
      enabled: ${LINKUP_PUSH_FCM_ENABLED:false}
      project-id: ${LINKUP_PUSH_FCM_PROJECT_ID:}
      access-token: ${LINKUP_PUSH_FCM_ACCESS_TOKEN:}

server:
  # 8081 to avoid a native Apache (httpd) already bound to host 8080.
  port: 8081
  # Finish in-flight requests on shutdown instead of dropping them (works with SIGTERM).
  shutdown: graceful

logging:
  level:
    com.linkup: DEBUG
