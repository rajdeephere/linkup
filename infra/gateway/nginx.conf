# WebSocket-aware load balancer over the two backend pods.
# Delivery does NOT depend on stickiness — a message crosses pods via Redis fan-out (ADR-0001) —
# so plain round-robin is fine for both REST and the WebSocket upgrade.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream linkup_backend {
    server backend1:8081;
    server backend2:8081;
}

server {
    listen 8081;

    location / {
        proxy_pass http://linkup_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # long-lived sockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
