# LinkUp — full local stack: MULTI-POD (Day 8) + Kafka (Day 9) + MinIO media (Day 10).
#
# Two backend pods (backend1, backend2) behind an nginx gateway (the LB). A message from a
# socket on one pod reaches a socket on the other via Redis Pub/Sub fan-out (ADR-0001), so no
# sticky sessions are needed. The browser hits the gateway on :8081; the pods are also exposed
# directly on :8091 / :8092 so a test can target a specific pod and prove cross-pod delivery.
#
# Kafka = durable async backbone (Day 9). MinIO = S3-compatible media storage; clients upload
# straight to it via presigned URLs (Day 10, ADR-0005). Cassandra is still deliberately absent.

x-backend: &backend
  image: linkup-backend:local
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
    minio:
      condition: service_healthy
  environment: &backend-env
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/linkup
    SPRING_DATASOURCE_USERNAME: linkup
    SPRING_DATASOURCE_PASSWORD: linkup
    SPRING_DATA_REDIS_HOST: redis
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    # Media presign (Day 10): endpoint is the BROWSER-reachable MinIO (it's signed into the URL),
    # so it's localhost:9000, not the in-cluster name — presigning is offline, so the app never
    # connects to it. Keys match the MinIO root credentials below.
    LINKUP_MEDIA_ENDPOINT: http://localhost:9000
    LINKUP_MEDIA_ACCESS_KEY: linkup
    LINKUP_MEDIA_SECRET_KEY: linkup-secret
    LINKUP_MEDIA_BUCKET: linkup-media
    LINKUP_JWT_SECRET: ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==

services:
  postgres:
    image: postgres:17-alpine
    container_name: linkup-postgres
    environment:
      POSTGRES_DB: linkup
      POSTGRES_USER: linkup
      POSTGRES_PASSWORD: linkup
    ports:
      - "5433:5432"
    volumes:
      - linkup-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkup -d linkup"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkup-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - linkup-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka (KRaft single-node) — the durable message log / async backbone.
  kafka:
    image: apache/kafka:3.9.0
    container_name: linkup-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # MinIO — S3-compatible object storage for media (Day 10, ADR-0005). Clients upload/download
  # bytes DIRECTLY here via presigned URLs; the app tier only ever signs. API on :9000 (also the
  # host the presigned URLs point at), web console on :9001.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: linkup-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: linkup
      MINIO_ROOT_PASSWORD: linkup-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - linkup-miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # One-shot: create the private media bucket once MinIO is up, then exit.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: linkup-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 linkup linkup-secret &&
      mc mb --ignore-existing local/linkup-media &&
      echo 'bucket linkup-media ready (private)'
      "

  # Pod 1 — builds the shared image; exposed directly on 8091 for the cross-pod demo.
  backend1:
    <<: *backend
    build:
      context: ../backend
    container_name: linkup-backend1
    ports:
      - "8091:8081"

  # Pod 2 — reuses backend1's built image; exposed directly on 8092.
  backend2:
    <<: *backend
    container_name: linkup-backend2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend1:
        condition: service_started
    ports:
      - "8092:8081"

  # The load balancer the browser talks to (round-robin over both pods, WebSocket-aware).
  gateway:
    image: nginx:alpine
    container_name: linkup-gateway
    depends_on:
      - backend1
      - backend2
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:8081"   # browser/REST/WebSocket → gateway → a backend pod

  frontend:
    build:
      context: ../frontend
    container_name: linkup-frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"

volumes:
  linkup-pgdata:
  linkup-redisdata:
  linkup-miniodata:
