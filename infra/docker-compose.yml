# LinkUp — full local stack, now MULTI-POD (Day 8).
#
# Two backend pods (backend1, backend2) behind an nginx gateway (the LB). A message from a
# socket on one pod reaches a socket on the other via Redis Pub/Sub fan-out (ADR-0001), so no
# sticky sessions are needed. The browser hits the gateway on :8081; the pods are also exposed
# directly on :8091 / :8092 so a test can target a specific pod and prove cross-pod delivery.
#
# Kafka / Cassandra / MinIO are deliberately NOT here yet — they arrive in Phase 2/3.

x-backend: &backend
  image: linkup-backend:local
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  environment: &backend-env
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/linkup
    SPRING_DATASOURCE_USERNAME: linkup
    SPRING_DATASOURCE_PASSWORD: linkup
    SPRING_DATA_REDIS_HOST: redis
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    LINKUP_JWT_SECRET: ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==

services:
  postgres:
    image: postgres:17-alpine
    container_name: linkup-postgres
    environment:
      POSTGRES_DB: linkup
      POSTGRES_USER: linkup
      POSTGRES_PASSWORD: linkup
    ports:
      - "5433:5432"
    volumes:
      - linkup-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkup -d linkup"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkup-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - linkup-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka (KRaft single-node) — the durable message log / async backbone.
  kafka:
    image: apache/kafka:3.9.0
    container_name: linkup-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Pod 1 — builds the shared image; exposed directly on 8091 for the cross-pod demo.
  backend1:
    <<: *backend
    build:
      context: ../backend
    container_name: linkup-backend1
    ports:
      - "8091:8081"

  # Pod 2 — reuses backend1's built image; exposed directly on 8092.
  backend2:
    <<: *backend
    container_name: linkup-backend2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend1:
        condition: service_started
    ports:
      - "8092:8081"

  # The load balancer the browser talks to (round-robin over both pods, WebSocket-aware).
  gateway:
    image: nginx:alpine
    container_name: linkup-gateway
    depends_on:
      - backend1
      - backend2
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:8081"   # browser/REST/WebSocket → gateway → a backend pod

  frontend:
    build:
      context: ../frontend
    container_name: linkup-frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"

volumes:
  linkup-pgdata:
  linkup-redisdata:
