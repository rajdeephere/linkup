<div class="auth">
  <button type="button" class="theme-toggle" (click)="theme.toggle()" title="Toggle theme">
    {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
  </button>

  <form class="card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="brand">
      <span class="logo">L</span>
      <div>
        <h1>LinkUp</h1>
        <p class="tagline">Always connected.</p>
      </div>
    </div>

    <h2>{{ mode() === 'login' ? 'Welcome back' : 'Create your account' }}</h2>

    <label>
      <span>Username</span>
      <input type="text" formControlName="username" autocomplete="username" placeholder="alice" />
    </label>

    @if (mode() === 'register') {
      <label>
        <span>Display name</span>
        <input type="text" formControlName="displayName" placeholder="Alice" />
      </label>
    }

    <label>
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" class="primary" [disabled]="loading()">
      {{ loading() ? 'Please wait…' : mode() === 'login' ? 'Log in' : 'Create account' }}
    </button>

    <p class="switch">
      {{ mode() === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button type="button" (click)="toggleMode()">
        {{ mode() === 'login' ? 'Register' : 'Log in' }}
      </button>
    </p>
  </form>
</div>
